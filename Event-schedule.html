<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylee.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/41b2463826.js"
      crossorigin="anonymous"
    ></script>

    <title>DST Tools</title>
  </head>
  <body>
    <header>
      <nav>
        <menu>
          <label for="toggle">☰</label> <input type="checkbox" id="toggle" />
          <ul class="menuItems">
            <a href="Homepage.html"><li>Homepage</li></a>
            <a href="Event-schedule.html"><li>Time Table</li></a>
            <a href="external-links.html"><li>Mods & links</li></a>
            <a href="news-and-updates.html"><li>News & Updates</li></a>
          </ul>
        </menu>
        <div>
          <a class="title" href="homepage.html">
            <img id="dstLogo" src="dst-logo-2.png" alt="" />
            <h1>Tools</h1></a
          >
        </div>
        <a
          href="https://store.steampowered.com/app/322330/Dont_Starve_Together/?l=french"
          target="_blank"
        >
          <img id="logoSteam" src="Steam_icon_logo.svg.png" alt="steam logo" />
        </a>
      </nav>
    </header>
    <main>
      <div class="box2">
        <h2>Time Table</h2>

        <div class="box1">
          <div class="setDay">
            <p>Day</p>
            <input type="number" id="dayInput" min="1" value="1" />
          </div>
          <button id="btnDay" class="btnDay">GO</button>
          <button id="reset">
            <i class="fa-solid fa-arrow-rotate-left"></i>
          </button>
        </div>
        <div id="seasonColor">
          <p id="autumnColor">autumn</p>
          <p id="winterColor">winter</p>
          <p id="springColor">spring</p>
          <p id="summerColor">summer</p>

        </div>
      </div>
      <div id="gridCalendar">
      </div>
    </main>
    <footer>
      <div id="linearGradient"></div>
      <div class="footerLinksBox">
        <a
          class="footerLinks"
          href="https://github.com/paulstephb"
          target="_blank"
          >GitHub</a
        >
      </div>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
