<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylee.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/41b2463826.js"
      crossorigin="anonymous"
    ></script>

    <title>DST Tools</title>
  </head>
  <body>
    <header>
      <nav>
        <menu>
          <label for="toggle">☰</label> <input type="checkbox" id="toggle" />
          <ul class="menuItems">
            <a href="Homepage.html"><li>Homepage</li></a>
            <a href="Event-schedule.html"><li>Time Table</li></a>
            <a href="external-links.html"><li>Mods & links</li></a>
            <a href="news-and-updates.html"><li>News & Updates</li></a>
          </ul>
        </menu>
        <div>
          <a class="title" href="homepage.html">
            <img id="dstLogo" src="dst-logo-2.png" alt="" />
            <h1>Tools</h1></a
          >
        </div>
        <a
          href="https://store.steampowered.com/app/322330/Dont_Starve_Together/?l=french"
          target="_blank"
        >
          <img id="logoSteam" src="Steam_icon_logo.svg.png" alt="steam logo" />
        </a>
      </nav>
    </header>
    <h1>Mods & Links</h1>
    <main class="mainExternalLinks">
      <div class="modList"></div>
      <div class="allExternalLinks">
        <div class="externalLinks">
          <a
            href="https://dontstarvetogether-crockpot.netlify.app/"
            target="_blank"
            class="preview-card"
          >
            <div class="card-image">
              <img src="crockpot.af82e98a.png" alt="" />
            </div>
            <div class="card-content">
              <h3 class="card-title">Crock Pot Recipies</h3>
              <p class="card-desc">
                A simple app to keep track of all the recipies you can make with
                a crock pot
              </p>
            </div>
          </a>
        </div>
        <div class="externalLinks">
          <a
            href="https://dontstarve.wiki.gg/wiki/Don%27t_Starve_Together"
            target="_blank"
            class="preview-card"
          >
            <div class="card-image">
              <img
                id="logoWiki"
                src="300px-Don't_Starve_Together_Logo.webp"
                alt=""
              />
            </div>
            <div class="card-content">
              <h3 class="card-title">Don't Starve Wiki</h3>
              <p class="card-desc">Don't Starve Up to Date wiki</p>
            </div>
          </a>
        </div>
      </div>
    </main>
    <footer>
      <div id="linearGradient"></div>
      <div class="footerLinksBox">
        <a
          class="footerLinks"
          href="https://github.com/paulstephb"
          target="_blank"
          >GitHub</a
        >
      </div>
    </footer>
  </body>
</html>
